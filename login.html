<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Shree Jhiljhile Secondary School</title>
    <link rel="stylesheet" href="ujwal.css"
    </head>
    <body>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <div class="login-box">
    <h2>लगइन</h2>
    <p>Ujwal Subedi</p>

    <label for="username">Email or Phone</label><br>
    <input type="text" id="email" placeholder="example@gmail.com">

    <br><br>

    <label for="password">Password</label><br>
    <input type="password" id="password" placeholder="Enter password">

    <br><br>

    <button type="button" onclick="checkLogin()">Next</button>
    
    <div style="margin-top: 15px;">
        <button type="button" style="width: 45%;">Forget</button>
        <button type="button" style="width: 45%;">Sign up</button>
    </div>
</div>

<script>
function checkLogin() {
    var emailInput = document.getElementById("email").value;
    var passInput = document.getElementById("password").value;

    // This checks if the email contains '@' and password is at least 6 characters
    // This allows ANY real Google ID style email to work
    if (emailInput.includes("@") && emailInput.includes(".") && passInput.length >= 6) {
        alert("Login Successful! Redirecting to School Portal...");
        window.location.href = "index.html"; 
    } else {
        alert("Invalid Login. Please enter a valid email and password (min 6 characters).");
    }
}
</script>

</body>
</html>
